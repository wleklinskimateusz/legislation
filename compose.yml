services:
  postgres:
    image: postgres:16-alpine
    container_name: voting-postgres
    restart: unless-stopped

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}

    volumes:
      - postgres_data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

    networks:
      - backend

  legislative-backend:
    build: apps/legislative-backend
    container_name: legislative-backend
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "${APP_PORT}:8080"

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - backend

networks:
  backend:
    driver: bridge

volumes:
  postgres_data: